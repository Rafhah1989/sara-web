<div class="grid">
    <div class="col-12">
        <div class="card p-fluid">
            <h5 class="cinzel-font mb-4" style="color: var(--primary-gold-dark);">
                {{ modoEdicao ? 'Editar Tabela : ' + freteAtual.descricao : 'Nova Tabela de Frete' }}
            </h5>

            <div class="grid">
                <!-- Informações Básicas -->
                <div class="col-12 md:col-6">
                    <label for="descricao" class="font-bold">Descrição</label>
                    <input pInputText id="descricao" [(ngModel)]="freteAtual.descricao" placeholder="Ex: Frete Capital">
                </div>
                <div class="col-12 md:col-3">
                    <label for="valor" class="font-bold">Valor Base</label>
                    <p-inputNumber id="valor" [(ngModel)]="freteAtual.valor" mode="currency" currency="BRL" locale="pt-BR" placeholder="R$ 0,00"></p-inputNumber>
                </div>
                <div class="col-12 md:col-3 flex align-items-end pb-2">
                    <div class="field-checkbox mb-0">
                        <p-checkbox id="ativo" [(ngModel)]="freteAtual.ativo" [binary]="true"></p-checkbox>
                        <label for="ativo" class="ml-2">Tabela Ativa</label>
                    </div>
                </div>

                <!-- Configuração de Faixas -->
                <div class="col-12 mt-3">
                    <p-panel header="Configuração por Faixa (Opcional)" [toggleable]="true" [collapsed]="!freteAtual.minimoFaixa && !freteAtual.quantidadeFaixa && !freteAtual.valorFaixa">
                        <div class="grid pt-2">
                            <div class="col-12 md:col-4">
                                <label for="minimoFaixa" class="font-bold">Valor Mínimo da Faixa (g)</label>
                                <p-inputNumber id="minimoFaixa" [(ngModel)]="freteAtual.minimoFaixa" placeholder="Ex: 500" [showButtons]="true" [min]="0"></p-inputNumber>
                            </div>
                            <div class="col-12 md:col-4">
                                <label for="quantidadeFaixa" class="font-bold">Taxa de Peso Extra (g)</label>
                                <p-inputNumber id="quantidadeFaixa" [(ngModel)]="freteAtual.quantidadeFaixa" placeholder="Ex: 5" [showButtons]="true" [min]="0"></p-inputNumber>
                            </div>
                            <div class="col-12 md:col-4">
                                <label for="valorFaixa" class="font-bold">Valor Adicional da Faixa</label>
                                <p-inputNumber id="valorFaixa" [(ngModel)]="freteAtual.valorFaixa" mode="currency" currency="BRL" locale="pt-BR" placeholder="R$ 0,00"></p-inputNumber>
                            </div>
                        </div>
                    </p-panel>
                </div>
            </div>

            <div class="flex justify-content-end gap-2 mt-4">
                <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text p-button-secondary" (click)="cancelar()" *ngIf="modoEdicao"></button>
                <button pButton pRipple [label]="modoEdicao ? 'Salvar Alterações' : 'Cadastrar Tabela'" 
                        [icon]="modoEdicao ? 'pi pi-save' : 'pi pi-check'" 
                        class="p-button-primary btn-gold" 
                        (click)="salvar()"
                        [disabled]="!freteAtual.descricao"></button>
            </div>
        </div>
    </div>

    <!-- Filtro e Listagem -->
    <div class="col-12">
        <div class="card">
            <div class="flex flex-column md:flex-row md:justify-content-between md:align-items-center mb-4">
                <h5 class="cinzel-font m-0">Tabelas de Frete Ativas</h5>
                <div class="p-inputgroup w-full md:w-25rem mt-3 md:mt-0">
                    <input pInputText type="text" [(ngModel)]="filtroDescricao" placeholder="Pesquisar por descrição..." (keyup.enter)="pesquisar()">
                    <button type="button" pButton pRipple icon="pi pi-search" class="btn-gold" (click)="pesquisar()"></button>
                </div>
            </div>

            <p-table [value]="tabelasFrete" [rows]="10" [paginator]="true" [responsiveLayout]="'scroll'" 
                     styleClass="p-datatable-gridlines" [rowHover]="true" dataKey="id">
                <ng-template pTemplate="header">
                    <tr>
                        <th pSortableColumn="descricao">Descrição <p-sortIcon field="descricao"></p-sortIcon></th>
                        <th pSortableColumn="valor" style="width: 12rem">Valor Base <p-sortIcon field="valor"></p-sortIcon></th>
                        <th style="width: 10rem">Status</th>
                        <th style="width: 10rem">Ações</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-frete>
                    <tr>
                        <td class="font-bold">{{ frete.descricao }}</td>
                        <td>{{ frete.valor | currency:'BRL' }}</td>
                        <td>
                            <p-tag [severity]="frete.ativo ? 'success' : 'danger'" 
                                   [value]="frete.ativo ? 'ATIVO' : 'INATIVO'" 
                                   [rounded]="true"></p-tag>
                        </td>
                        <td>
                            <div class="flex gap-2">
                                <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-info p-button-text" 
                                        (click)="editar(frete)" pTooltip="Editar"></button>
                                <button pButton pRipple [icon]="frete.ativo ? 'pi pi-slash' : 'pi pi-check'" 
                                        [class]="frete.ativo ? 'p-button-rounded p-button-danger p-button-text' : 'p-button-rounded p-button-success p-button-text'" 
                                        (click)="frete.ativo ? desativar(frete.id) : ativar(frete)" 
                                        [pTooltip]="frete.ativo ? 'Desativar' : 'Ativar'"></button>
                            </div>
                        </td>
                    </tr>
                </ng-template>
                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td colspan="4" class="text-center p-4">Nenhuma tabela de frete encontrada.</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</div>
