<div class="forgot-password-wrapper">
    <div class="forgot-password-container">
        <div class="forgot-password-card card">
            <div class="header">
                <i class="fas fa-key"></i>
                <h1>Recuperar Senha</h1>
                <p>Informe seu CPF ou CNPJ para receber um link de recuperação.</p>
            </div>

            <div *ngIf="!sucesso">
                <div class="form-group">
                    <label for="cpfCnpj">CPF / CNPJ</label>
                    <input type="text" id="cpfCnpj" [(ngModel)]="cpfCnpj" (input)="applyMask($event)" 
                           placeholder="000.000.000-00" maxlength="18" [disabled]="loading">
                </div>

                <div class="actions">
                    <button class="btn-gold" (click)="enviar()" [disabled]="!cpfCnpj || loading">
                        <span *ngIf="loading" class="spinner"></span>
                        {{ loading ? 'Enviando...' : 'Enviar Link de Recuperação' }}
                    </button>
                    <button class="btn-outline" routerLink="/login" [disabled]="loading">Voltar ao Login</button>
                </div>
            </div>

            <div *ngIf="sucesso" class="success-message">
                <div class="icon">✅</div>
                <p>{{ mensagem }}</p>
                <p class="small">Você será redirecionado para a tela de login em instantes...</p>
                <button class="btn-gold" routerLink="/login">Ir para Login Agora</button>
            </div>
        </div>
    </div>
</div>
