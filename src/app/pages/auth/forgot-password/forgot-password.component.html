<div class="forgot-password-wrapper">
    <div class="forgot-password-panel surface-card shadow-4 border-round-xl p-fluid">
        <div class="flex flex-column align-items-center mb-5">
            <div class="text-3xl font-bold cinzel-font gold-text mb-3">Recuperar Senha</div>
            <span *ngIf="!sucesso" class="text-600 montserrat-font text-sm text-center">Informe seu CPF ou CNPJ para receber um link de recuperação.</span>
        </div>

        <div *ngIf="!sucesso">
            <div class="field mb-5">
                <label for="cpfCnpj" class="block text-900 font-medium mb-3 montserrat-font">CPF / CNPJ</label>
                <span class="p-input-icon-left">
                    <i class="pi pi-user gold-text"></i>
                    <input id="cpfCnpj" type="text" pInputText [(ngModel)]="cpfCnpj" 
                           placeholder="000.000.000-00" (input)="applyMask($event)" maxlength="18"
                           [disabled]="loading">
                </span>
            </div>

            <div class="flex flex-column gap-3">
                <button pButton pRipple label="Enviar Link de Recuperação" icon="pi pi-send" 
                        class="p-button-lg btn-gold shadow-2" (click)="enviar()" 
                        [loading]="loading" [disabled]="!cpfCnpj"></button>
                
                <div class="text-center mt-2">
                    <a routerLink="/login" class="forgot-password-link-custom no-underline cursor-pointer hover:underline montserrat-font inline-flex align-items-center justify-content-center">
                        <i class="pi pi-arrow-left mr-2" style="font-size: 0.9rem;"></i>
                        Voltar ao Login
                    </a>
                </div>
            </div>
        </div>

        <!-- Mensagem de Sucesso de Alta Fidelidade -->
        <div *ngIf="sucesso" class="flex flex-column align-items-center gap-4 py-2">
            <div class="w-5rem h-5rem border-circle bg-gold-faded flex align-items-center justify-content-center mb-2">
                <i class="pi pi-check-circle gold-text" style="font-size: 3rem;"></i>
            </div>
            
            <div class="text-center">
                <p class="text-900 font-bold text-xl mb-3 montserrat-font line-height-3 px-2">
                    Link de recuperação enviado com sucesso!
                </p>
                <p class="text-600 text-sm montserrat-font px-3">
                    Se o documento informado estiver em nossa base, você receberá as instruções em seu e-mail cadastrado.
                </p>
            </div>

            <div class="w-full mt-4 flex flex-column align-items-center">
                <button pButton pRipple label="Ir para Login Agora" icon="pi pi-sign-in" 
                        class="btn-gold shadow-2 w-auto px-6" routerLink="/login"></button>
                <p class="text-500 text-xs mt-3 italic montserrat-font">Redirecionando automaticamente em instantes...</p>
            </div>
        </div>
    </div>
</div>
