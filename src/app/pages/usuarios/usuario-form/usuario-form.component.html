<div class="grid">
    <div class="col-12">
        <div class="card p-fluid">
            <h5 class="cinzel-font mb-4" style="color: var(--primary-gold-dark);">{{ modoEdicao ? 'Alterar Usuário' : 'Novo Usuário' }}</h5>
            
            <form [formGroup]="userForm" (ngSubmit)="salvar()">
                <!-- Dados Básicos -->
                <p-card header="Dados Básicos" styleClass="mb-4 shadow-1">
                    <div class="field grid">
                        <div class="col-12">
                            <label for="nome" class="font-bold">Nome Completo</label>
                            <input pInputText id="nome" formControlName="nome" placeholder="Digite o nome completo" [ngClass]="{'ng-invalid ng-dirty': isInvalid('nome')}">
                            <small class="p-error" *ngIf="isInvalid('nome')">Nome é obrigatório (máx 100 caracteres).</small>
                        </div>
                    </div>
    
                    <div class="field grid">
                        <div class="col-12 md:col-4">
                            <label for="cpfCnpj" class="font-bold">CPF / CNPJ</label>
                            <input pInputText id="cpfCnpj" formControlName="cpfCnpj" (input)="applyCpfCnpjMask($event)" 
                                   placeholder="000.000.000-00" [ngClass]="{'ng-invalid ng-dirty': isInvalid('cpfCnpj')}">
                            <small class="p-error" *ngIf="isInvalid('cpfCnpj')">CPF ou CNPJ inválido.</small>
                        </div>
                        <div class="col-12 md:col-4">
                            <label for="email" class="font-bold">E-mail</label>
                            <input pInputText id="email" formControlName="email" type="email" placeholder="exemplo@email.com" [ngClass]="{'ng-invalid ng-dirty': isInvalid('email')}">
                            <small class="p-error" *ngIf="isInvalid('email')">E-mail válido é obrigatório.</small>
                        </div>
                        <div class="col-12 md:col-4">
                            <label for="telefone" class="font-bold">Telefone</label>
                            <input pInputText id="telefone" formControlName="telefone" (input)="applyTelefoneMask($event)" 
                                   placeholder="(00) 00000-0000" [ngClass]="{'ng-invalid ng-dirty': isInvalid('telefone')}">
                            <small class="p-error" *ngIf="isInvalid('telefone')">Formato inválido.</small>
                        </div>
                    </div>
                </p-card>

                <!-- Endereço -->
                <p-card header="Endereço" styleClass="mb-4 shadow-1">
                    <div class="field grid">
                        <div class="col-12 md:col-3">
                            <label for="cep" class="font-bold">CEP</label>
                            <p-inputMask id="cep" mask="99999-999" formControlName="cep" (onBlur)="buscarCep()" 
                                         placeholder="00000-000" [unmask]="true" [ngClass]="{'ng-invalid ng-dirty': isInvalid('cep')}"></p-inputMask>
                            <small class="p-error" *ngIf="isInvalid('cep')">CEP obrigatório.</small>
                        </div>
                        <div class="col-12 md:col-6">
                            <label for="endereco" class="font-bold">Endereço</label>
                            <input pInputText id="endereco" formControlName="endereco" placeholder="Rua, Av, etc.">
                        </div>
                        <div class="col-12 md:col-3">
                            <label for="numero" class="font-bold">Número</label>
                            <input pInputText id="numero" formControlName="numero" placeholder="Nº">
                        </div>
                    </div>

                    <div class="field grid">
                        <div class="col-12 md:col-5">
                            <label for="cidade" class="font-bold">Cidade</label>
                            <input pInputText id="cidade" formControlName="cidade" placeholder="Cidade" [ngClass]="{'ng-invalid ng-dirty': isInvalid('cidade')}">
                            <small class="p-error" *ngIf="isInvalid('cidade')">Obrigatório.</small>
                        </div>
                        <div class="col-12 md:col-5">
                            <label for="bairro" class="font-bold">Bairro</label>
                            <input pInputText id="bairro" formControlName="bairro" placeholder="Bairro" [ngClass]="{'ng-invalid ng-dirty': isInvalid('bairro')}">
                            <small class="p-error" *ngIf="isInvalid('bairro')">Obrigatório.</small>
                        </div>
                        <div class="col-12 md:col-2">
                            <label for="uf" class="font-bold">UF</label>
                            <p-dropdown [options]="ufs" formControlName="uf" placeholder="UF" [ngClass]="{'ng-invalid ng-dirty': isInvalid('uf')}"></p-dropdown>
                            <small class="p-error" *ngIf="isInvalid('uf')">Obrigatório.</small>
                        </div>
                    </div>
                </p-card>

                <!-- Paróquia -->
                <p-card header="Paróquia" styleClass="mb-4 shadow-1">
                    <div class="field grid">
                        <div class="col-12 md:col-4">
                            <label for="paroco" class="font-bold">Pároco</label>
                            <input pInputText id="paroco" formControlName="paroco" placeholder="Nome do Pároco">
                        </div>
                        <div class="col-12 md:col-4">
                            <label for="secretario" class="font-bold">Secretário(a)</label>
                            <input pInputText id="secretario" formControlName="secretario" placeholder="Nome do(a) Secretário(a)">
                        </div>
                        <div class="col-12 md:col-4">
                            <label for="tesoureiro" class="font-bold">Tesoureiro</label>
                            <input pInputText id="tesoureiro" formControlName="tesoureiro" placeholder="Nome do Tesoureiro">
                        </div>
                    </div>
                </p-card>

                <!-- Parcelamento -->
                <p-card header="Parcelamento" styleClass="mb-4 shadow-1">
                    <div class="field-checkbox mb-3">
                        <p-checkbox id="permitirParcelamento" formControlName="permitirParcelamento" [binary]="true"></p-checkbox>
                        <label for="permitirParcelamento" class="ml-2">Permitir Parcelamento para este usuário</label>
                    </div>

                    <div *ngIf="userForm.get('permitirParcelamento')?.value" class="mt-3">
                        <label class="font-bold block mb-2">Opções de Parcelamento Autorizadas</label>
                        <div class="grid">
                            <div *ngFor="let opt of todasOpcoesParcelamento" class="col-12 md:col-6 lg:col-4">
                                <div class="field-checkbox p-2 border-1 border-300 border-round">
                                    <p-checkbox [id]="'opt-' + opt.id" [value]="opt.id" 
                                               [ngModel]="userForm.get('opcoesParcelamentoIds')?.value" 
                                               [ngModelOptions]="{standalone: true}"
                                               (onChange)="onOpcaoToggleManual($event, opt.id!)"></p-checkbox>
                                    <label [for]="'opt-' + opt.id" class="ml-2 text-sm">
                                        <strong>{{ opt.formaPagamentoDescricao }}</strong>: Até {{ opt.qtdMaxParcelas }}x
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div *ngIf="todasOpcoesParcelamento.length === 0" class="p-3 text-center surface-100 border-round">
                            Nenhuma opção de parcelamento cadastrada.
                        </div>
                    </div>
                </p-card>

                <!-- Pagamento e Frete -->
                <p-card header="Pagamento e Frete" styleClass="mb-4 shadow-1">
                    <div class="field grid">
                        <div class="col-12 md:col-4">
                            <label for="formaPagamento" class="font-bold">Forma de Pagamento Preferencial</label>
                            <p-dropdown [options]="formasPagamento" formControlName="formaPagamento" optionLabel="descricao" optionValue="id" placeholder="Selecione..."></p-dropdown>
                        </div>
                        <div class="col-12 md:col-4">
                            <label for="desconto" class="font-bold">Desconto (%)</label>
                            <p-inputNumber formControlName="desconto" mode="decimal" [minFractionDigits]="2" [maxFractionDigits]="2" placeholder="0.00"></p-inputNumber>
                        </div>
                        <div class="col-12 md:col-4">
                            <label for="modalidadeEntrega" class="font-bold">Modalidade de Entrega</label>
                            <input pInputText id="modalidadeEntrega" formControlName="modalidadeEntrega" placeholder="Ex: Correios">
                        </div>
                    </div>

                    <div class="field grid">
                        <div class="col-12 md:col-4">
                            <label for="setorId" class="font-bold">Setor</label>
                            <p-dropdown [options]="setoresAtivos" formControlName="setorId" optionLabel="descricao" optionValue="id" (onChange)="onSetorChange()" placeholder="Selecione o Setor..."></p-dropdown>
                        </div>
                        <div class="col-12 md:col-4">
                            <label for="tabelaFreteId" class="font-bold">Tabela de Frete</label>
                            <p-dropdown [options]="tabelasFreteFiltradas" formControlName="tabelaFreteId" optionLabel="descricao" optionValue="id" 
                                       [disabled]="!userForm.get('setorId')?.value" 
                                       [placeholder]="!userForm.get('setorId')?.value ? 'Selecione um setor primeiro' : 'Selecione a Tabela...'"></p-dropdown>
                        </div>
                        <div class="col-12 md:col-4">
                            <label for="role" class="font-bold">Tipo de Usuário</label>
                            <p-dropdown [options]="roles" formControlName="role" placeholder="Selecione..."></p-dropdown>
                        </div>
                    </div>

                    <div class="field grid">
                        <div class="col-12">
                            <label for="metodoPagamentoAutorizado" class="font-bold">Método de Pagamento Autorizado</label>
                            <p-dropdown [options]="metodosAutorizados" formControlName="metodoPagamentoAutorizado" optionLabel="descricao" optionValue="id" [ngClass]="{'ng-invalid ng-dirty': isInvalid('metodoPagamentoAutorizado')}"></p-dropdown>
                            <small class="p-error" *ngIf="isInvalid('metodoPagamentoAutorizado')">Obrigatório.</small>
                        </div>
                    </div>

                    <div class="field-checkbox">
                        <p-checkbox id="ativarDescontoAVista" formControlName="ativarDescontoAVista" [binary]="true"></p-checkbox>
                        <label for="ativarDescontoAVista" class="ml-2">Ativar Desconto à Vista da Forma de Pagamento</label>
                    </div>
                </p-card>

                <!-- Observações -->
                <p-card header="Observações" styleClass="mb-4 shadow-1">
                    <div class="field">
                        <label for="observacao" class="font-bold">Observação</label>
                        <textarea pInputTextarea id="observacao" formControlName="observacao" rows="3" placeholder="Observações adicionais..."></textarea>
                    </div>
                </p-card>

                <!-- Autenticação -->
                <p-card header="Autenticação" styleClass="mb-5 shadow-1">
                    <div class="field grid">
                        <div class="col-12 md:col-6">
                            <label for="senha" class="font-bold">Senha (6 números) {{ modoEdicao ? '(Opcional)' : '' }}</label>
                            <p-password id="senha" formControlName="senha" [toggleMask]="true" [feedback]="true" 
                                       promptLabel="Digite a senha" weakLabel="Fraca" mediumLabel="Média" strongLabel="Forte"
                                       [ngClass]="{'ng-invalid ng-dirty': isInvalid('senha')}"></p-password>
                        </div>
                        <div class="col-12 md:col-6">
                            <label for="confirmarSenha" class="font-bold">Confirmar Senha</label>
                            <p-password id="confirmarSenha" formControlName="confirmarSenha" [toggleMask]="true" [feedback]="false"
                                       [ngClass]="{'ng-invalid ng-dirty': userForm.hasError('mismatch') && userForm.get('confirmarSenha')?.touched}"></p-password>
                            <small class="p-error" *ngIf="userForm.hasError('mismatch') && userForm.get('confirmarSenha')?.touched">As senhas não conferem.</small>
                        </div>
                    </div>
                </p-card>

                <!-- Ações -->
                <div class="flex justify-content-end gap-3 mt-4">
                    <button pButton pRipple type="button" label="Voltar" icon="pi pi-arrow-left" class="p-button-outlined p-button-secondary" (click)="voltar()"></button>
                    <button pButton pRipple type="submit" [label]="modoEdicao ? 'Salvar Alterações' : 'Cadastrar Usuário'" icon="pi pi-check" class="p-button-success btn-gold" [disabled]="userForm.invalid"></button>
                </div>
            </form>
        </div>
    </div>
</div>
