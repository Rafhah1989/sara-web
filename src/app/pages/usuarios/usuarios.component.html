<div class="page-title-banner text-center">
    <h1>Gestão de Usuários</h1>
</div>

<section class="users-page container">
    <!-- Topo: Botão de Cadastro -->
    <div class="top-actions-row">
        <button class="btn-gold" (click)="cadastrarNovo()">
            <i class="fa fa-plus"></i> Cadastrar Usuário
        </button>
    </div>

    <!-- Container de Consulta -->
    <div class="search-container card">
        <h3>Consulta de Usuários</h3>
        <div class="search-form-row">
            <div class="form-group">
                <label>Pesquisar por Nome</label>
                <div class="input-with-icon">
                    <i class="fa fa-search"></i>
                    <input type="text" [(ngModel)]="filtroNome" (input)="onNomeInput()" placeholder="Mínimo 3 caracteres...">
                </div>
            </div>
        </div>
    </div>

    <!-- Listagem -->
    <div class="user-list">
        <table class="card">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF/CNPJ</th>
                    <th class="hide-mobile">Telefone</th>
                    <th class="hide-mobile">Tipo</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let user of users">
                    <td>{{ user.nome }}</td>
                    <td>{{ user.cpfCnpj }}</td>
                    <td class="hide-mobile">{{ user.telefone }}</td>
                    <td class="hide-mobile">{{ user.role }}</td>
                    <td>
                        <span class="status-badge" [class.active]="user.ativo" [class.inactive]="!user.ativo">
                            {{ user.ativo ? 'Ativo' : 'Inativo' }}
                        </span>
                    </td>
                    <td>
                        <!-- Ações Desktop -->
                        <div class="actions hide-mobile">
                            <button class="btn-action btn-edit" (click)="editar(user)" title="Editar/Visualizar">
                                <i class="fa fa-pencil-alt"></i>
                            </button>
                            <button class="btn-action btn-history" (click)="verHistorico(user)" title="Histórico do Cliente">
                                <i class="fa fa-history"></i>
                            </button>
                            <button class="btn-action btn-invite" (click)="reenviarConvite(user)" title="Reenviar Convite">
                                <i class="fa fa-envelope"></i>
                            </button>
                            <button class="btn-action btn-danger" (click)="desativar(user.id)" *ngIf="user.ativo" title="Desativar">
                                <i class="fa fa-ban"></i>
                            </button>
                            <button class="btn-action btn-success" (click)="ativar(user.id)" *ngIf="!user.ativo" title="Ativar">
                                <i class="fa fa-check"></i>
                            </button>
                        </div>

                        <!-- Ações Mobile (Menu Sanduíche) -->
                        <div class="mobile-actions show-mobile">
                            <button class="btn-sandwich" (click)="alternarMenuAcoes(user.id!, $event)">
                                <i class="fa fa-ellipsis-v"></i>
                            </button>
                            <div class="actions-menu" *ngIf="itemMenuAberto === user.id">
                                <button (click)="editar(user)"><i class="fa fa-pencil-alt"></i> Editar</button>
                                <button (click)="verHistorico(user)"><i class="fa fa-history"></i> Histórico</button>
                                <button (click)="reenviarConvite(user)"><i class="fa fa-envelope"></i> Convite</button>
                                <button (click)="desativar(user.id)" *ngIf="user.ativo" class="text-danger"><i class="fa fa-ban"></i> Desativar</button>
                                <button (click)="ativar(user.id)" *ngIf="!user.ativo" class="text-success"><i class="fa fa-check"></i> Ativar</button>
                            </div>
                        </div>
                    </td>
                </tr>
                <tr *ngIf="users.length === 0">
                    <td colspan="6" class="no-data">Nenhum usuário encontrado com os filtros aplicados.</td>
                </tr>
            </tbody>
        </table>
    </div>
</section>

<!-- Modal de Histórico -->
<app-historico-cliente-modal 
    *ngIf="exibirModalHistorico" 
    [usuarioId]="usuarioSelecionadoHistorico?.id!" 
    [usuarioNome]="usuarioSelecionadoHistorico?.nome!"
    (fechar)="fecharHistorico()">
</app-historico-cliente-modal>
