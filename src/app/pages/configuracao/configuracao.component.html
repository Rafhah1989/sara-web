<div class="grid">
    <div class="col-12">
        <div class="card p-fluid">
            <h5 class="cinzel-font mb-4" style="color: var(--primary-gold-dark);">Configurações do Sistema</h5>

            <p-tabView>
                <!-- Aba 1: E-mail e Alertas -->
                <p-tabPanel header="E-mail & Notificações" leftIcon="pi pi-envelope mr-2">
                    <div class="grid mt-2">
                        <div class="col-12 md:col-6">
                            <label for="mailHost" class="font-bold">Host SMTP</label>
                            <input pInputText id="mailHost" [(ngModel)]="config.mailHost" placeholder="ex: smtp.gmail.com">
                        </div>
                        <div class="col-12 md:col-2">
                            <label for="mailPort" class="font-bold">Porta</label>
                            <p-inputNumber id="mailPort" [(ngModel)]="config.mailPort" [useGrouping]="false"></p-inputNumber>
                        </div>
                        <div class="col-12 md:col-4">
                            <label for="mailUsername" class="font-bold">Usuário (E-mail)</label>
                            <input pInputText id="mailUsername" [(ngModel)]="config.mailUsername" placeholder="seu-email@gmail.com">
                        </div>

                        <div class="col-12 md:col-4">
                            <label for="mailPassword" class="font-bold">Senha de App</label>
                            <p-password id="mailPassword" [(ngModel)]="config.mailPassword" [feedback]="false" [toggleMask]="true" placeholder="Deixe vazio para manter"></p-password>
                        </div>

                        <div class="col-12 md:col-8">
                            <div class="flex flex-wrap gap-4 mt-4">
                                <div class="field-checkbox">
                                    <p-checkbox id="emailAtivo" [(ngModel)]="config.emailAtivo" [binary]="true"></p-checkbox>
                                    <label for="emailAtivo" class="ml-2">Envio Ativo</label>
                                </div>
                                <div class="field-checkbox">
                                    <p-checkbox id="mailAuth" [(ngModel)]="config.mailAuth" [binary]="true"></p-checkbox>
                                    <label for="mailAuth" class="ml-2">Autenticação SMTP</label>
                                </div>
                                <div class="field-checkbox">
                                    <p-checkbox id="mailStarttls" [(ngModel)]="config.mailStarttls" [binary]="true"></p-checkbox>
                                    <label for="mailStarttls" class="ml-2">STARTTLS</label>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 mt-3">
                            <label for="emailsNotificacao" class="font-bold">E-mails de Alerta (Administração)</label>
                            <textarea pInputTextarea id="emailsNotificacao" [(ngModel)]="config.emailsNotificacao" 
                                      rows="3" placeholder="admin@empresa.com, vendas@empresa.com (separe por vírgula)"></textarea>
                            <small class="text-secondary">Estes endereços receberão notificações detalhadas de novos pedidos.</small>
                        </div>
                    </div>
                </p-tabPanel>

                <!-- Aba 2: Regras de Boleto -->
                <p-tabPanel header="Regras de Boleto" leftIcon="pi pi-file mr-2">
                    <div class="grid mt-2">
                        <!-- Multa -->
                        <div class="col-12 md:col-4">
                            <label class="font-bold">Multa após vencimento</label>
                            <div class="p-inputgroup">
                                <p-dropdown [options]="[{label: '%', value: 'percentage'}, {label: 'R$', value: 'fixed'}]" 
                                            [(ngModel)]="configBoleto.multaTipo" optionLabel="label" optionValue="value"
                                            [style]="{'width': '80px'}"></p-dropdown>
                                <p-inputNumber [(ngModel)]="configBoleto.multaValor" 
                                               [mode]="configBoleto.multaTipo === 'fixed' ? 'currency' : 'decimal'" 
                                               currency="BRL" locale="pt-BR" 
                                               [minFractionDigits]="2" [maxFractionDigits]="2"></p-inputNumber>
                            </div>
                        </div>

                        <!-- Juros -->
                        <div class="col-12 md:col-4">
                            <label class="font-bold">Juros de mora (mensal)</label>
                            <div class="p-inputgroup">
                                <p-dropdown [options]="[{label: '%', value: 'percentage'}, {label: 'R$', value: 'fixed'}]" 
                                            [(ngModel)]="configBoleto.jurosTipo" optionLabel="label" optionValue="value"
                                            [style]="{'width': '80px'}"></p-dropdown>
                                <p-inputNumber [(ngModel)]="configBoleto.jurosValor" 
                                               [mode]="configBoleto.jurosTipo === 'fixed' ? 'currency' : 'decimal'" 
                                               currency="BRL" locale="pt-BR" 
                                               [minFractionDigits]="2" [maxFractionDigits]="2"></p-inputNumber>
                            </div>
                        </div>

                        <!-- Desconto -->
                        <div class="col-12 md:col-4">
                            <label class="font-bold">Desconto p/ antecipação</label>
                            <div class="p-inputgroup">
                                <p-dropdown [options]="[{label: '%', value: 'percentage'}, {label: 'R$', value: 'fixed'}]" 
                                            [(ngModel)]="configBoleto.descontoTipo" optionLabel="label" optionValue="value"
                                            [style]="{'width': '80px'}"></p-dropdown>
                                <p-inputNumber [(ngModel)]="configBoleto.descontoValor" 
                                               [mode]="configBoleto.descontoTipo === 'fixed' ? 'currency' : 'decimal'" 
                                               currency="BRL" locale="pt-BR" 
                                               [minFractionDigits]="2" [maxFractionDigits]="2"></p-inputNumber>
                            </div>
                        </div>

                        <div class="col-12 md:col-4 mt-3">
                            <label for="descontoDias" class="font-bold">Dias de antecedência para desconto</label>
                            <p-inputNumber id="descontoDias" [(ngModel)]="configBoleto.descontoDiasAntecedencia" 
                                           [showButtons]="true" [min]="0" buttonLayout="horizontal" 
                                           spinnerMode="horizontal" incrementButtonIcon="pi pi-plus" 
                                           decrementButtonIcon="pi pi-minus"></p-inputNumber>
                        </div>
                    </div>
                </p-tabPanel>
            </p-tabView>

            <div class="flex justify-content-end mt-5">
                <button pButton pRipple label="Salvar Todas as Configurações" icon="pi pi-save" 
                        class="p-button-primary btn-gold md:w-20rem" 
                        (click)="salvar()" [disabled]="loading"></button>
            </div>
        </div>
    </div>
</div>
