<div class="login-wrapper">
    <div class="login-panel surface-card shadow-4 border-round-xl p-fluid">
        <div class="flex flex-column align-items-center mb-5">
            <div class="logo-container mb-4 shadow-1 border-round-xl p-2 bg-black-alpha-90">
                <img src="assets/sara_logo.PNG" alt="SARA Logo" style="width: 120px; height: auto; display: block;">
            </div>
            <div class="text-3xl font-bold cinzel-font gold-text mb-2">Acesse o Sistema</div>
            <span class="text-600 montserrat-font text-sm text-center">Por favor, identifique-se para entrar no sistema Sara</span>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="field mb-4">
                <label for="cpfCnpj" class="block text-900 font-medium mb-2 montserrat-font">CPF / CNPJ</label>
                <span class="p-input-icon-left">
                    <i class="pi pi-user gold-text"></i>
                    <input id="cpfCnpj" type="text" pInputText formControlName="cpfCnpj" 
                           placeholder="000.000.000-00" (input)="applyMask($event)" maxlength="18"
                           [ngClass]="{'ng-invalid ng-dirty': submitted && f['cpfCnpj'].errors}">
                </span>
                <small *ngIf="submitted && f['cpfCnpj'].errors?.['required']" class="p-error block mt-1">
                    CPF/CNPJ é obrigatório.
                </small>
            </div>

            <div class="field mb-5">
                <label for="senha" class="block text-900 font-medium mb-2 montserrat-font">Senha</label>
                <div class="relative w-full">
                    <!-- Ícone Lock (ESQUERDA) -->
                    <i class="pi pi-lock gold-text absolute top-50 transform-translate-y-50 ml-3 z-2" style="left: 0;"></i>
                    
                    <input id="senha" [type]="showSenha ? 'text' : 'password'" pInputText formControlName="senha" 
                           placeholder="Digite sua senha" class="w-full pl-5 pr-5"
                           [ngClass]="{'ng-invalid ng-dirty': submitted && f['senha'].errors}">

                    <!-- Ícone Olho (DIREITA) -->
                    <i class="pi gold-text absolute top-50 transform-translate-y-50 mr-3 cursor-pointer z-2" 
                       [ngClass]="showSenha ? 'pi-eye-slash' : 'pi-eye'"
                       (click)="showSenha = !showSenha" style="right: 0;"></i>
                </div>
                <small *ngIf="submitted && f['senha'].errors?.['required']" class="p-error block mt-1">
                    Senha é obrigatória.
                </small>
            </div>

            <div *ngIf="error" class="p-message p-message-error mb-4 border-round" style="padding: 1rem;">
                <div class="flex align-items-center gap-2">
                    <i class="pi pi-exclamation-circle"></i>
                    <span class="text-sm">{{ error }}</span>
                </div>
            </div>

            <button pButton pRipple label="ENTRAR" icon="pi pi-sign-in" 
                    class="p-button-lg btn-gold shadow-2 mb-4" [loading]="loading"></button>

            <div class="flex align-items-center justify-content-center">
                <a routerLink="/forgot-password" class="forgot-password-link-custom no-underline cursor-pointer hover:underline montserrat-font">
                    Esqueci/Alterar Senha
                </a>
            </div>
        </form>

    </div>
</div>
