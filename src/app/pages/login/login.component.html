<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Entrar no Sistema</h2>
      <p>Bem-vindo ao Sara App</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="cpfCnpj">CPF / CNPJ</label>
        <input 
          type="text" 
          id="cpfCnpj" 
          formControlName="cpfCnpj" 
          class="form-control" 
          (input)="applyMask($event)"
          [ngClass]="{ 'is-invalid': submitted && f['cpfCnpj'].errors }" 
          maxlength="18"
          placeholder="Digite seu CPF ou CNPJ"
        />
        <div *ngIf="submitted && f['cpfCnpj'].errors" class="invalid-feedback">
          <div *ngIf="f['cpfCnpj'].errors['required']">CPF/CNPJ é obrigatório</div>
        </div>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input 
          type="password" 
          id="senha" 
          formControlName="senha" 
          class="form-control" 
          [ngClass]="{ 'is-invalid': submitted && f['senha'].errors }" 
          placeholder="Digite sua senha"
        />
        <div *ngIf="submitted && f['senha'].errors" class="invalid-feedback">
          <div *ngIf="f['senha'].errors['required']">Senha é obrigatória</div>
        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>

      <button [disabled]="loading" class="btn btn-primary btn-block">
        <span *ngIf="loading" class="spinner-border spinner-border-sm mr-1"></span>
        Entrar
      </button>
    </form>
  </div>
</div>
