<p-dialog [(visible)]="display" [modal]="true" [style]="{width: '70vw'}" [breakpoints]="{'960px': '95vw'}" 
          [header]="'Histórico de Pedidos - ' + usuarioNome" (onHide)="onFechar()">
    
    <div class="p-fluid">
        <div class="grid mb-4">
            <div class="col-12 md:col-6">
                <label for="situacaoSelect" class="font-bold mb-2 block">Situação</label>
                <p-dropdown [options]="situacoesPedido" [(ngModel)]="filtroSituacao" 
                           optionLabel="descricao" optionValue="codigo" 
                           placeholder="Todas as situações" (onChange)="carregarHistorico()"
                           [showClear]="true"></p-dropdown>
            </div>
            <div class="col-12 md:col-6 flex align-items-end">
                <div class="field-checkbox mb-2">
                    <p-checkbox id="exibirCancelados" [(ngModel)]="exibirCancelados" [binary]="true" (onChange)="carregarHistorico()"></p-checkbox>
                    <label for="exibirCancelados" class="ml-2">Exibir Cancelados</label>
                </div>
            </div>
        </div>

        <div *ngIf="loading" class="flex flex-column align-items-center justify-content-center p-5">
            <p-progressSpinner styleClass="w-4rem h-4rem" strokeWidth="4"></p-progressSpinner>
            <p class="mt-3">Carregando histórico...</p>
        </div>

        <p-table *ngIf="!loading" [value]="pedidos" [rows]="5" [paginator]="true" 
                 responsiveLayout="scroll" styleClass="p-datatable-sm">
            <ng-template pTemplate="header">
                <tr>
                    <th style="width: 15%">Pedido</th>
                    <th style="width: 25%">Data</th>
                    <th style="width: 20%">Valor</th>
                    <th style="width: 25%">Situação</th>
                    <th style="width: 15%">Ações</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-pedido>
                <tr [ngStyle]="{'opacity': pedido.cancelado ? '0.6' : '1'}">
                    <td>
                        #{{ pedido.id }}
                    </td>
                    <td>
                        {{ pedido.dataPedido | date:'dd/MM/yyyy HH:mm' }}
                    </td>
                    <td>
                        <strong>{{ pedido.valorTotal | currency:'BRL' }}</strong>
                    </td>
                    <td>
                        <p-tag [severity]="getSeverity(pedido.situacao)" [value]="pedido.situacaoDescricao"></p-tag>
                    </td>
                    <td>
                        <button pButton pRipple icon="pi pi-eye" class="p-button-rounded p-button-text p-button-info" 
                                (click)="editarPedido(pedido.id)" pTooltip="Ver Detalhes"></button>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="5" class="text-center p-4">Nenhum pedido encontrado para este cliente.</td>
                </tr>
            </ng-template>
        </p-table>
    </div>

    <ng-template pTemplate="footer">
        <button pButton pRipple label="Fechar" icon="pi pi-times" class="p-button-text" (click)="onFechar()"></button>
    </ng-template>
</p-dialog>
